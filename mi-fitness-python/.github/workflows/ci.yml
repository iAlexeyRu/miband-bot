name: CI

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/**"

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"
          version: latest

      - name: Ruff check
        run: uvx ruff check --output-format=github src/ tests/unit/

      - name: Ruff format check
        run: uvx ruff format --check src/ tests/unit/

  basedpyright:
    name: BasedPyright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"
          version: latest

      - name: Install Dependencies
        run: uv sync

      - name: Static typing check
        run: uvx basedpyright src/ tests/unit/

  test:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: coverage-${{ github.ref }}-${{ matrix.python-version }}
      cancel-in-progress: true

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    env:
      PYTHON: ${{ matrix.python-version }}
      UV_NO_SYNC: 1

    steps:
      - uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
          version: latest

      - name: Install Dependencies
        run: uv sync

      - name: Run Pytest
        run: uv run pytest tests/unit/ --cov=src --cov-report xml --junitxml=./junit.xml -n auto

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          env_vars: PYTHON
          use_oidc: true
          report_type: test_results

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          env_vars: PYTHON
          use_oidc: true
